<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <!-- iOS & mobile essentials -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="مفردات">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#c9a84c">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple touch icons (required for iOS home screen) -->
  <link rel="apple-touch-icon" href="icon-192.png">

  <title>مفردات – Arabisch Vokabeltrainer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Playfair+Display:wght@500;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f0e0c;
      --surface: #1a1814;
      --card: #221f1b;
      --border: #3a342c;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text: #f0e8d8;
      --muted: #8a7d6a;
      --green: #5a9e6f;
      --red: #c06055;
      --fs: 1.05rem;
      --ar: 2.6rem;
      /* iOS safe areas */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overscroll-behavior: none; /* prevents iOS bounce on body */
      -webkit-text-size-adjust: 100%; /* prevent iOS font inflation */
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-size: var(--fs);
      direction: ltr;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh; /* dynamic viewport height – handles iOS Safari toolbar */
      padding:
        calc(var(--safe-top) + 16px)
        16px
        calc(var(--safe-bottom) + 16px);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent; /* remove iOS tap flash */
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
    }
    .ornament { color: var(--gold); font-size: 1.2rem; letter-spacing: 6px; }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 5vw, 1.9rem);
      color: var(--gold-light);
      margin: 4px 0;
      letter-spacing: 2px;
    }
    header p { color: var(--muted); font-size: 0.8rem; font-weight: 300; }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      width: 100%;
      max-width: 540px;
    }
    .font-control { display: flex; align-items: center; gap: 8px; }
    .font-control label { color: var(--muted); font-size: 0.75rem; white-space: nowrap; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 90px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px; /* larger = easier on touch */
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.2);
    }
    input[type=range]::-moz-range-thumb {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
      cursor: pointer;
    }
    .font-val { color: var(--gold); font-size: 0.75rem; min-width: 30px; }

    .mode-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      -webkit-appearance: none;
      touch-action: manipulation;
      transition: background 0.2s, color 0.2s;
      min-height: 36px; /* iOS minimum tap target */
    }
    .mode-btn.active {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
      font-weight: 700;
    }

    /* ── Progress bar ── */
    .progress-bar {
      width: 100%; max-width: 540px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Card ── */
    #viewCard {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .card-wrap {
      width: 100%;
      max-width: 460px;
      perspective: 1000px;
      cursor: pointer;
      margin-bottom: 16px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .card {
      position: relative;
      width: 100%;
      /* Use min-height instead of padding-bottom so content never clips on small screens */
      min-height: 200px;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
      -webkit-transition: -webkit-transform 0.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }
    .card.flipped {
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
    }

    .card-face {
      position: absolute; inset: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      padding: 44px 20px 20px;
    }
    .card-back {
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
    }
    .card-wrap:active .card-face { border-color: var(--gold); }

    .card-label {
      position: absolute;
      top: 12px; left: 16px;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      direction: ltr;
    }
    .card-tag {
      position: absolute;
      top: 10px; right: 14px;
      background: var(--border);
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 0.65rem;
      color: var(--muted);
      direction: ltr;
    }

    /* Arabic: RTL */
    .arabic-text {
      font-family: 'Scheherazade New', serif;
      font-size: var(--ar);
      color: var(--gold-light);
      line-height: 1.5;
      text-align: right;
      direction: rtl;
      unicode-bidi: bidi-override;
      width: 100%;
    }
    /* Transliteration: LTR */
    .transliteration {
      font-style: italic;
      color: var(--muted);
      font-size: 0.85em;
      direction: ltr;
      unicode-bidi: embed;
      text-align: center;
    }
    /* German: LTR */
    .german-text {
      font-family: 'Playfair Display', serif;
      font-size: calc(var(--fs) * 1.35);
      color: var(--text);
      text-align: left;
      direction: ltr;
      unicode-bidi: embed;
      width: 100%;
    }
    /* Example sentence: Arabic RTL */
    .example-sentence {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: right;
      font-style: italic;
      direction: rtl;
      unicode-bidi: bidi-override;
      font-family: 'Scheherazade New', serif;
      width: 100%;
    }
    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      direction: ltr;
    }

    /* ── Answer buttons ── */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 460px;
      margin-bottom: 14px;
    }
    .answer-btn {
      flex: 1;
      padding: 14px 10px;
      border-radius: 12px;
      border: 1px solid;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      -webkit-appearance: none;
      touch-action: manipulation;
      min-height: 50px; /* iOS tap target */
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-wrong { border-color: var(--red); background: transparent; color: var(--red); }
    .btn-wrong:active { background: var(--red); color: white; }
    .btn-right { border-color: var(--green); background: transparent; color: var(--green); }
    .btn-right:active { background: var(--green); color: white; }
    .answer-btn:disabled { opacity: 0.25; }

    /* ── Navigation ── */
    .nav-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .nav-btn {
      padding: 10px 22px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      -webkit-appearance: none;
      touch-action: manipulation;
      min-height: 44px;
      transition: border-color 0.15s, color 0.15s;
    }
    .nav-btn:active { border-color: var(--gold); color: var(--gold); }
    .counter { color: var(--muted); font-size: 0.85rem; min-width: 64px; text-align: center; direction: ltr; }

    /* ── Stats ── */
    .stats { display: flex; gap: 24px; margin-top: 18px; }
    .stat { text-align: center; }
    .stat-num {
      font-size: 1.4rem;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      direction: ltr;
    }
    .stat-lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; direction: ltr; }
    .stat-num.green { color: var(--green); }
    .stat-num.red { color: var(--red); }

    /* ── List view ── */
    #viewList { width: 100%; max-width: 540px; }
    #vocabTable { width: 100%; border-collapse: collapse; }
    #vocabTable th {
      padding: 8px 10px;
      text-align: left;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 400;
      direction: ltr;
      border-bottom: 1px solid var(--border);
    }
    .cell-arabic {
      font-family: 'Scheherazade New', serif;
      font-size: var(--ar);
      direction: rtl;
      unicode-bidi: bidi-override;
      text-align: right;
      color: var(--gold-light);
      padding: 10px;
    }
    .cell-ltr {
      direction: ltr;
      unicode-bidi: embed;
      text-align: left;
      padding: 10px;
      font-size: var(--fs);
    }
    tr { border-bottom: 1px solid var(--border); }

    /* ── Install banner (iOS hint) ── */
    #installBanner {
      display: none;
      background: var(--surface);
      border: 1px solid var(--gold);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: var(--muted);
      max-width: 540px;
      width: 100%;
      margin-bottom: 14px;
      text-align: center;
      direction: ltr;
    }
    #installBanner span { color: var(--gold-light); }
    #installBanner button {
      background: none; border: none; color: var(--muted);
      float: right; cursor: pointer; font-size: 1rem; line-height: 1;
      padding: 0 0 0 8px;
    }
  </style>
</head>
<body>

  <!-- iOS install hint -->
  <div id="installBanner">
    <button onclick="document.getElementById('installBanner').style.display='none'">✕</button>
    📲 Tippe auf <span>Teilen → Zum Home-Bildschirm</span> um die App zu installieren
  </div>

  <header>
    <div class="ornament">✦ ✦ ✦</div>
    <h1>مُفرَدات · Vokabeltrainer</h1>
    <p>Arabisch lernen — eine Karte nach der anderen</p>
  </header>

  <div class="controls">
    <div class="font-control">
      <label>Schriftgröße</label>
      <input type="range" id="sizeSlider" min="0.75" max="1.6" step="0.05" value="1.05">
      <span class="font-val" id="sizeVal">100%</span>
    </div>
    <div class="font-control">
      <label>Arabisch</label>
      <input type="range" id="arabicSlider" min="1.5" max="5" step="0.1" value="2.6">
      <span class="font-val" id="arabicVal">2.6</span>
    </div>
    <button class="mode-btn active" id="modeCard" onclick="setMode('card')">Karten</button>
    <button class="mode-btn" id="modeList" onclick="setMode('list')">Liste</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <!-- Card view -->
  <div id="viewCard">
    <div class="card-wrap" id="cardWrap">
      <div class="card" id="card">
        <div class="card-face card-front">
          <span class="card-label">Arabisch</span>
          <span class="card-tag" id="frontTag"></span>
          <div class="arabic-text" id="arabicWord"></div>
          <div class="transliteration" id="translit"></div>
          <div class="hint" style="margin-top:8px">Tippe zum Umdrehen 🔄</div>
        </div>
        <div class="card-face card-back">
          <span class="card-label">Deutsch</span>
          <div class="german-text" id="germanWord"></div>
          <div class="example-sentence" id="exampleSentence"></div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="answer-btn btn-wrong" id="btnWrong" onclick="answer(false)" disabled>✗ Falsch</button>
      <button class="answer-btn btn-right" id="btnRight" onclick="answer(true)" disabled>✓ Richtig</button>
    </div>

    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()">← Zurück</button>
      <span class="counter" id="counter">1 / 10</span>
      <button class="nav-btn" onclick="nextCard()">Weiter →</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-num green" id="statRight">0</div><div class="stat-lbl">Richtig</div></div>
      <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">Gesamt</div></div>
      <div class="stat"><div class="stat-num red" id="statWrong">0</div><div class="stat-lbl">Falsch</div></div>
    </div>
  </div>

  <!-- List view -->
  <div id="viewList" style="display:none;">
    <table id="vocabTable"></table>
  </div>

<script>
// ── Vocab data ──────────────────────────────────────────────
const vocab = [
  { ar: "مَرْحَباً",  tr: "Marhaban",  de: "Hallo / Willkommen", tag: "Begrüßung",  ex: "مَرْحَباً بِكَ!" },
  { ar: "شُكْراً",   tr: "Shukran",   de: "Danke",               tag: "Höflichkeit",ex: "شُكْراً جَزِيلاً" },
  { ar: "مَاء",      tr: "Mā'",       de: "Wasser",               tag: "Nomen",      ex: "أُرِيدُ مَاءً" },
  { ar: "بَيْت",     tr: "Bayt",      de: "Haus",                 tag: "Nomen",      ex: "هَذَا بَيْتِي" },
  { ar: "كَبِير",    tr: "Kabīr",     de: "Groß",                 tag: "Adjektiv",   ex: "بَيْتٌ كَبِيرٌ" },
  { ar: "يَأْكُل",   tr: "Ya'kul",    de: "Er isst",              tag: "Verb",       ex: "هُوَ يَأْكُلُ الخُبْزَ" },
  { ar: "كِتَاب",    tr: "Kitāb",     de: "Buch",                 tag: "Nomen",      ex: "هَذَا كِتَابٌ جَمِيلٌ" },
  { ar: "صَدِيق",    tr: "Sadīq",     de: "Freund",               tag: "Nomen",      ex: "هُوَ صَدِيقِي" },
  { ar: "جَمِيل",    tr: "Jamīl",     de: "Schön",                tag: "Adjektiv",   ex: "الطَّقْسُ جَمِيلٌ" },
  { ar: "يَوْم",     tr: "Yawm",      de: "Tag",                  tag: "Nomen",      ex: "يَوْمٌ سَعِيدٌ" },
];

// ── State ────────────────────────────────────────────────────
let current = 0, flipped = false, rightCount = 0, wrongCount = 0, answered = 0;

// ── Card logic ───────────────────────────────────────────────
function show(i) {
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  const v = vocab[i];
  document.getElementById('arabicWord').textContent    = v.ar;
  document.getElementById('translit').textContent      = v.tr;
  document.getElementById('frontTag').textContent      = v.tag;
  document.getElementById('germanWord').textContent    = v.de;
  document.getElementById('exampleSentence').textContent = v.ex;
  document.getElementById('counter').textContent       = `${i+1} / ${vocab.length}`;
  document.getElementById('progress').style.width      = `${((i+1)/vocab.length)*100}%`;
  document.getElementById('btnWrong').disabled = true;
  document.getElementById('btnRight').disabled = true;

  // Fix card height after content update
  requestAnimationFrame(fixCardHeight);
}

function fixCardHeight() {
  const wrap = document.getElementById('cardWrap');
  const faces = wrap.querySelectorAll('.card-face');
  let maxH = 0;
  faces.forEach(f => { f.style.position = 'relative'; maxH = Math.max(maxH, f.offsetHeight); f.style.position = ''; });
  document.getElementById('card').style.minHeight = maxH + 'px';
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
  if (flipped) {
    document.getElementById('btnWrong').disabled = false;
    document.getElementById('btnRight').disabled = false;
  }
}

function answer(correct) {
  if (correct) rightCount++; else wrongCount++;
  answered++;
  document.getElementById('statRight').textContent = rightCount;
  document.getElementById('statWrong').textContent  = wrongCount;
  document.getElementById('statTotal').textContent  = answered;
  nextCard();
}

function nextCard() { if (current < vocab.length - 1) show(++current); }
function prevCard() { if (current > 0) show(--current); }

// ── Touch / swipe support ────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
const cardWrap = document.getElementById('cardWrap');

cardWrap.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

cardWrap.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    flipCard(); // tap
  } else if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    dx > 0 ? prevCard() : nextCard(); // swipe
  }
}, { passive: true });

// ── Sliders ──────────────────────────────────────────────────
document.getElementById('sizeSlider').addEventListener('input', function() {
  const v = parseFloat(this.value);
  document.documentElement.style.setProperty('--fs', v + 'rem');
  document.getElementById('sizeVal').textContent = Math.round(v / 1.05 * 100) + '%';
  requestAnimationFrame(fixCardHeight);
});
document.getElementById('arabicSlider').addEventListener('input', function() {
  const v = parseFloat(this.value);
  document.documentElement.style.setProperty('--ar', v + 'rem');
  document.getElementById('arabicVal').textContent = v.toFixed(1);
  requestAnimationFrame(fixCardHeight);
});

// ── List view ────────────────────────────────────────────────
function buildList() {
  const t = document.getElementById('vocabTable');
  t.innerHTML = `<tr>
    <th>Arabisch</th><th>Aussprache</th><th>Deutsch</th><th>Typ</th>
  </tr>`;
  vocab.forEach(v => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td class="cell-arabic">${v.ar}</td>
      <td class="cell-ltr" style="color:var(--muted);font-style:italic;font-size:0.82em">${v.tr}</td>
      <td class="cell-ltr" style="font-family:'Playfair Display',serif">${v.de}</td>
      <td class="cell-ltr"><span style="background:var(--border);border-radius:10px;padding:2px 8px;font-size:0.68rem;color:var(--muted)">${v.tag}</span></td>`;
    t.appendChild(row);
  });
}

function setMode(m) {
  document.getElementById('viewCard').style.display = m === 'card' ? 'flex' : 'none';
  document.getElementById('viewList').style.display = m === 'list'  ? 'block' : 'none';
  document.getElementById('modeCard').classList.toggle('active', m === 'card');
  document.getElementById('modeList').classList.toggle('active', m === 'list');
  if (m === 'list') buildList();
}

// ── iOS install hint ─────────────────────────────────────────
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                   || navigator.standalone;
if (isIOS && !isStandalone) {
  document.getElementById('installBanner').style.display = 'block';
}

// ── Service Worker ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ── Init ─────────────────────────────────────────────────────
show(0);
window.addEventListener('resize', fixCardHeight);
</script>
</body>
</html>
